name = "flare-forge"
compatibility_date = "2025-04-01"

# D1 Database binding — `database_id` is auto-populated by `npm run setup`.
[[d1_databases]]
binding = "DB"
database_name = "flare-forge-db"
database_id = "YOUR_D1_DATABASE_ID"

# R2 Storage binding — rename `bucket_name` to "<your-project>-assets" so
# multiple projects don't share one bucket. Created by `npm run setup`.
[[r2_buckets]]
binding = "R2"
bucket_name = "flare-forge-assets"

# Email Workers — Send Email binding for outbound transactional email.
# Sends via Cloudflare Email Routing (recipient must be a verified
# destination address in your Email Routing setup). No third-party
# email service or API key required.
#
# To enable:
#   1. Dashboard → your domain → Email → Email Routing → Enable.
#   2. Add a destination address (e.g. you@gmail.com) and verify it.
#   3. Set SALES_INBOX secret below to the verified destination.
[[send_email]]
name = "SEND_EMAIL"

# ─────────────────────────────────────────────────────────────────────────
# Production secrets — set with `npx wrangler secret put <NAME>`.
# Do NOT commit them and do NOT add them to `[vars]` (vars override secrets
# of the same name and will silently break the binding).
#
# Required:
#   API_KEY      — Bearer token guarding /api/publish and /api/upload.
#                  Generate with: openssl rand -hex 32
#   SALES_INBOX  — Verified Email Routing destination that receives
#                  /api/inquiry and /api/waitlist notifications.
#
# For local dev, put non-secret values in `.dev.vars` (gitignored).
# ─────────────────────────────────────────────────────────────────────────
