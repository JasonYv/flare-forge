name = "altus-volt"
compatibility_date = "2025-04-01"

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "altus-volt-db"
database_id = "a032639d-5bf6-4356-acbb-201971ac40a5"

# R2 Storage binding
[[r2_buckets]]
binding = "R2"
bucket_name = "flare-forge-assets"

# Local dev vars — auto-generated by `npm run setup`
# Production secrets: use `npx wrangler secret put <NAME>`
#
# Required production secrets:
#   API_KEY        — Bearer token for /api/publish and /api/upload (admin endpoints)
#   RESEND_API_KEY — Resend.com transactional email key for /api/inquiry and /api/waitlist
#                    Sign up at https://resend.com (free 100/day, 3000/month)
#                    Then: npx wrangler secret put RESEND_API_KEY
#
# Optional:
#   SALES_INBOX    — destination email for inquiries (defaults to sales@altusvolt.com)
[vars]
API_KEY = "REPLACE_ME"
