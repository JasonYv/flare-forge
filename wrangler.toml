name = "flare-forge"
compatibility_date = "2025-04-01"

# D1 Database binding
# `database_id` is auto-populated by `npm run setup`
[[d1_databases]]
binding = "DB"
database_name = "flare-forge-db"
database_id = "YOUR_D1_DATABASE_ID"

# R2 Storage binding
[[r2_buckets]]
binding = "R2"
bucket_name = "flare-forge-assets"

# Local dev vars — auto-generated by `npm run setup`
# Production: use `npx wrangler secret put API_KEY`
[vars]
API_KEY = "REPLACE_ME"
